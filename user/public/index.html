<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Industrial Safety Edge Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="connection-banner" class="banner connected">
        <span id="conn-status-text">✅ 邊緣閘道器連線正常 (Edge Link Active)</span>
        <span id="sop-instruction" class="hidden">⚠️ 請勿靠近機台。底層 OT 防護仍獨立運作中。</span>
    </div>

    <div class="dashboard-container">
        <div class="panel safety-panel" id="safety-panel">
            <h2>🛡️ 核心安全防護區 (Safety-Critical)</h2>
            <div class="distance-display">
                <span id="distance-val">--</span>
                <span class="unit">cm</span>
            </div>
            <div id="system-status" class="status-badge normal">WAITING FOR DATA...</div>
        </div>

        <div class="panel env-panel">
            <h2>🏭 環境與門禁監測 (Environment & Access)</h2>
            <ul class="data-list">
                <li>💨 PM2.5: <span id="pm25-val">--</span> <span class="unit">μg/m³</span></li>
                <li>🔊 噪音: <span id="noise-val">--</span> <span class="unit">dB</span></li>
                <li>🔑 最後刷卡: <span id="rfid-val">--</span></li>
                <li>⏱️ 最後更新: <span id="timestamp-val">--</span></li>
            </ul>
        </div>
    </div>

    <script src="dashboard.js"></script>
</body>
</html>
